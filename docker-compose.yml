services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shopping}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopping}
      POSTGRES_DB: ${POSTGRES_DB:-shopping}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopping}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    restart: unless-stopped
    command: uvicorn app.web.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  bot:
    build: .
    restart: unless-stopped
    command: python -m app.bot.main
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
