<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mockup — All bought / enter prices</title><link rel="stylesheet" href="mockup.css" /></head>
<body>
<div class="phone">
  <div class="statusbar"></div>
  <div class="screen">
    <div class="row-between">
      <h1 class="title">🛒 Shopping list</h1>
      <span class="subtle">Jun 23, 2026</span>
    </div>

    <div class="summary">
      <div><div class="label">Predicted total</div><div class="value">24.80 USD</div></div>
      <div style="text-align:right"><div class="label">Bought</div><div class="value green">6 / 6</div></div>
    </div>
    <div class="progress"><span style="width:100%"></span></div>

    <div class="cat green">✓ Bought</div>
    <div class="item bought"><span class="check"></span><span class="name">milk<span class="qty">×2</span></span><span class="price">5.00 USD</span></div>
    <div class="item bought"><span class="check"></span><span class="name">tomatoes<span class="qty">×3</span></span><span class="price">4.20 USD</span></div>
    <div class="item bought"><span class="check"></span><span class="name">chicken breast</span><span class="price">8.50 USD</span></div>
    <div class="item bought"><span class="check"></span><span class="name">bread</span></div>
    <div class="item bought"><span class="check"></span><span class="name">orange juice</span><span class="price">3.10 USD</span></div>
    <div class="item bought"><span class="check"></span><span class="name">toilet paper</span><span class="price">4.00 USD</span></div>

    <div class="card">
      <h2>All done! 🎉</h2>
      <p class="subtle" style="margin-top:0">Enter what you actually paid so we can improve predictions and your statistics.</p>
      <label class="field"><span>bread</span><input type="number" placeholder="2.50" /></label>
      <label class="field"><span>Total paid (USD)</span><input type="number" value="26.40" /></label>
      <button class="btn">Save &amp; finish</button>
    </div>
  </div>
</div>
</body></html>
