<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mockup — Statistics</title><link rel="stylesheet" href="mockup.css" /></head>
<body>
<div class="phone">
  <div class="statusbar"></div>
  <div class="screen">
    <div class="row-between">
      <h1 class="title">📊 Statistics</h1>
      <span class="subtle">Andrey</span>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="value">1,284.50 USD</div><div class="label">Total spent</div></div>
      <div class="stat-card"><div class="value">37</div><div class="label">Shopping trips</div></div>
    </div>

    <div class="bars">
      <h2>Monthly spending</h2>
      <div class="bar-row"><span class="period">2026-06</span><span class="track"><span style="width:100%"></span></span><span class="amount">248.10 USD</span></div>
      <div class="bar-row"><span class="period">2026-05</span><span class="track"><span style="width:82%"></span></span><span class="amount">203.40 USD</span></div>
      <div class="bar-row"><span class="period">2026-04</span><span class="track"><span style="width:74%"></span></span><span class="amount">184.00 USD</span></div>
      <div class="bar-row"><span class="period">2026-03</span><span class="track"><span style="width:91%"></span></span><span class="amount">225.90 USD</span></div>
    </div>

    <div class="bars">
      <h2>Yearly spending</h2>
      <div class="bar-row"><span class="period">2026</span><span class="track"><span style="width:100%"></span></span><span class="amount">1,061.40 USD</span></div>
      <div class="bar-row"><span class="period">2025</span><span class="track"><span style="width:21%"></span></span><span class="amount">223.10 USD</span></div>
    </div>

    <div class="bars">
      <h2>Most bought items</h2>
      <ul class="toplist">
        <li><span>milk</span><span class="count">31×</span></li>
        <li><span>bread</span><span class="count">28×</span></li>
        <li><span>egg</span><span class="count">22×</span></li>
        <li><span>banana</span><span class="count">19×</span></li>
        <li><span>chicken breast</span><span class="count">14×</span></li>
      </ul>
    </div>
  </div>
</div>
</body></html>
