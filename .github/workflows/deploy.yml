name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vps
  cancel-in-progress: false   # never abort a deploy mid-flight

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy over SSH (with retry)
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          for attempt in 1 2 3; do
            $SSH "set -e
              cd ${{ secrets.VPS_REPO_PATH }}
              git fetch origin main
              git reset --hard origin/main
              docker compose up -d --build
              docker image prune -f" && exit 0
            echo "Attempt $attempt failed, waiting 20s before retry..."
            sleep 20
          done
          echo "All 3 attempts failed." && exit 1

      - name: Notify admin — success
        if: success()
        env:
          TG: ${{ secrets.BOT_TOKEN }}
          CHAT: ${{ secrets.ADMIN_TELEGRAM_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG=$(printf '✅ Deployed %s\n%s' "${GITHUB_SHA:0:7}" "${COMMIT_MSG}")
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            -d chat_id="${CHAT}" --data-urlencode text="${MSG}" >/dev/null

      - name: Notify admin — failure
        if: failure()
        env:
          TG: ${{ secrets.BOT_TOKEN }}
          CHAT: ${{ secrets.ADMIN_TELEGRAM_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG=$(printf '❌ Deploy FAILED %s\n%s\nLog: %s' "${GITHUB_SHA:0:7}" "${COMMIT_MSG}" "${RUN_URL}")
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            -d chat_id="${CHAT}" --data-urlencode text="${MSG}" >/dev/null
