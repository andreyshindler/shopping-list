<!DOCTYPE html>
<html lang="{{ lang|default('he') }}" dir="{{ dir|default('rtl') }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>{% block title %}{{ t.shopping_list if t else 'Shopping list' }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="wrap">
    {% if lang_token %}
    <div class="langbar">
      <a class="{{ 'on' if lang == 'en' }}"
         href="/api/set-language?lang=en&kind={{ lang_kind }}&token={{ lang_token }}&next={{ request.url.path|urlencode }}">EN</a>
      <a class="{{ 'on' if lang == 'he' }}"
         href="/api/set-language?lang=he&kind={{ lang_kind }}&token={{ lang_token }}&next={{ request.url.path|urlencode }}">עב</a>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
  <script>
    // Confirm submission for any form carrying a data-confirm message.
    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("form[data-confirm]").forEach(function (form) {
        form.addEventListener("submit", function (e) {
          if (!window.confirm(form.dataset.confirm)) e.preventDefault();
        });
      });
    });

    // When running as a Telegram Mini App, swipe down from the top closes it
    // (instead of leaving it minimized in the background).
    (function () {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) return;
      tg.ready();
      tg.enableVerticalSwipes();

      // Back button in the Mini App header — closes and restores the bot keyboard.
      tg.BackButton.show();
      tg.BackButton.onClick(function () { tg.close(); });

      // Share button — forward the list URL via Telegram's share sheet.
      var shareBtn = document.getElementById("share-btn");
      if (shareBtn) {
        shareBtn.style.display = "inline-flex";
        shareBtn.addEventListener("click", function () {
          var cleanUrl = location.origin + location.pathname;
          tg.openTelegramLink("https://t.me/share/url?url=" + encodeURIComponent(cleanUrl));
        });
      }

      // Swipe-down from top also closes the Mini App.
      var startY = 0, startScroll = 0;
      document.addEventListener("touchstart", function (e) {
        startY = e.touches[0].clientY;
        startScroll = window.scrollY;
      }, { passive: true });
      document.addEventListener("touchend", function (e) {
        var dy = e.changedTouches[0].clientY - startY;
        if (dy > 60 && startScroll === 0 && startY < 80) tg.close();
      }, { passive: true });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
