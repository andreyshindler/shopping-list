<!DOCTYPE html>
<html lang="{{ lang|default('he') }}" dir="{{ dir|default('rtl') }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>{% block title %}{{ t.shopping_list if t else 'Shopping list' }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="wrap">
    <div class="langbar">
      <a class="{{ 'on' if lang == 'en' }}"
         href="/set-language?lang=en&next={{ request.url.path|urlencode }}">EN</a>
      <a class="{{ 'on' if lang == 'he' }}"
         href="/set-language?lang=he&next={{ request.url.path|urlencode }}">עב</a>
    </div>
    {% block content %}{% endblock %}
  </div>
  <script>
    // Confirm submission for any form carrying a data-confirm message.
    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("form[data-confirm]").forEach(function (form) {
        form.addEventListener("submit", function (e) {
          if (!window.confirm(form.dataset.confirm)) e.preventDefault();
        });
      });
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
